[rtsp]
url = rtsp://admin:Bossien1@192.168.0.140/h264/ch1/sub/av_stream
transport = tcp
buffer_size = 1048576

[capture]
# 抓帧模式: fps(每秒帧数) 或 interval(间隔秒数)
# 方式1: 使用 fps - 每秒抓取帧数 (1=每秒1帧, 2=每秒2帧, 5=每秒5帧)
fps = 2
# 方式2: 使用 interval - 每隔多少秒抓取1帧 (0.5=每0.5秒, 2=每2秒, 5=每5秒)
# 注意: 如果设置了 interval > 0，则优先使用 interval，忽略 fps
interval = 0
# 是否保存每帧截图到 frames 目录 (True/False)
save_frames = False
# JPEG 质量 (1-31, 越小质量越好文件越大, 推荐 3-10)
quality = 5

[detection]
threshold = 400
min_contour_area = 0.0002
stable_frames = 1
save_screenshot = True

[logging]
level = INFO
file = rtsp_monitor.log
max_bytes = 10485760
backup_count = 5

[monitoring]
enabled = True
interval = 60
