[rtsp]
url = rtsp://admin:Bossien1@192.168.0.140/h264/ch1/sub/av_stream
transport = tcp
buffer_size = 1048576

[capture]
fps = 1
# 是否保存每帧截图到 frames 目录 (True/False)
save_frames = False
quality = 5

[detection]
threshold = 600
min_contour_area = 0.0005
stable_frames = 1
save_screenshot = True

[logging]
level = INFO
file = rtsp_monitor.log
max_bytes = 10485760
backup_count = 5

[monitoring]
enabled = True
interval = 60
